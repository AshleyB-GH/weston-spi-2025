name: Build Windows App

on:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - run: npm run make
      - uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: out/make/**/*.exe
